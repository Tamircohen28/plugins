name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate marketplace.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check valid JSON
        run: |
          python3 -c "
          import json, sys
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          print('JSON is valid')
          # Required top-level fields
          required = ['name', 'version', 'description', 'owner', 'plugins']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'Missing required fields: {missing}', file=sys.stderr)
              sys.exit(1)
          # Each plugin entry must have name, source, description
          for p in data['plugins']:
              for field in ['name', 'source', 'description']:
                  if field not in p:
                      print(f'Plugin entry missing field \"{field}\": {p}', file=sys.stderr)
                      sys.exit(1)
          print(f'All {len(data[\"plugins\"])} plugin entries are valid')
          "

      - name: Secret scan
        run: |
          echo "Scanning for accidental secrets..."
          if grep -rE '(ghp_[A-Za-z0-9]{36}|sk-[A-Za-z0-9]{48}|AKIA[A-Z0-9]{16}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY)' \
            --include="*.json" --include="*.md" --include="*.yml" .; then
            echo "Potential secret found — review before merging"
            exit 1
          fi
          echo "No secrets found"

  lint-docs:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check README exists and is non-empty
        run: |
          [[ -s README.md ]] && echo "README.md OK" || (echo "README.md missing or empty" && exit 1)
