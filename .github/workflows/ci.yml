name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate marketplace manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Regenerate and verify platform manifests
        run: make validate

      - name: Secret scan
        run: |
          echo "Scanning for accidental secrets..."
          if grep -rE '''(ghp_[A-Za-z0-9]{36}|sk-[A-Za-z0-9]{48}|AKIA[A-Z0-9]{16}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY)'''             --include="*.json" --include="*.md" --include="*.yml" .; then
            echo "Potential secret found — review before merging"
            exit 1
          fi
          echo "No secrets found"

  lint-docs:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check README exists and is non-empty
        run: |
          [[ -s README.md ]] && echo "README.md OK" || (echo "README.md missing or empty" && exit 1)
